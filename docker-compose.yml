services:
  postgres:
    image: postgres:16-alpine
    container_name: factuec-postgres
    environment:
      POSTGRES_DB: factuec
      POSTGRES_USER: factuec
      POSTGRES_PASSWORD: factuec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factuec -d factuec"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: factuec-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/factuec
      DB_USERNAME: factuec
      DB_PASSWORD: factuec
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      SRI_MOCK_ENABLED: "true"
      SIGNATURE_MOCK_ENABLED: "true"
      SMTP_ENABLED: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data:
