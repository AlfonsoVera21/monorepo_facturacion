services:
  postgres:
    image: postgres:16-alpine
    container_name: factuec-postgres
    environment:
      POSTGRES_DB: factuec
      POSTGRES_USER: factuec
      POSTGRES_PASSWORD: factuec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factuec -d factuec"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: factuec-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/factuec
      DB_USERNAME: factuec
      DB_PASSWORD: factuec
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      SRI_AMBIENTE_DEFAULT: ${SRI_AMBIENTE_DEFAULT:-PRUEBAS}
      SRI_MOCK_ENABLED: ${SRI_MOCK_ENABLED:-false}
      SIGNATURE_MOCK_ENABLED: ${SIGNATURE_MOCK_ENABLED:-false}
      FACTUEC_CERTIFICATES_PATH: ${FACTUEC_CERTIFICATES_PATH:-/app/storage/certificates}
      FIRMA_ELECTRONICA_PASSWORD: ${FIRMA_ELECTRONICA_PASSWORD:-}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@factuec.local}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-false}
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data:
