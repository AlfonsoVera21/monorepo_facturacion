<div class="app-layout" [class.app-layout--collapsed]="collapsed()">
  <app-sidebar
    [open]="sidebarOpen()"
    [collapsed]="collapsed()"
    (closeSidebar)="closeSidebar()"
    (toggleCollapsed)="toggleCollapsed()"
  />

  <div class="app-layout__overlay" [class.is-open]="sidebarOpen()" (click)="closeSidebar()"></div>

  <section class="app-layout__main">
    <app-header (openSidebar)="openSidebar()" />
    <main class="app-layout__content">
      <router-outlet />
    </main>
  </section>
</div>
